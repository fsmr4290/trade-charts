function tToX(t){
  const m=tToMin(t);

});
cv.addEventListener('mouseleave',()=>{tip.style.display='none';hoverMarker=-1;render();});
const wins=DATA.trades.filter(t=>t.pnl!==null&&t.pnl>0).length;
const losses=DATA.trades.filter(t=>t.pnl!==null&&t.pnl<0).length;
const evens=DATA.trades.filter(t=>t.pnl===0).length;
const total=DATA.trades.filter(t=>t.pnl!==null).reduce((s,t)=>s+t.pnl,0);
const wr=(wins+losses+evens)>0?(wins/(wins+losses+evens)*100).toFixed(1):'0.0';
const totalCls=total>=0?'win':'lose',totalSign=total>=0?'+':'';
const cardsEl=document.getElementById('cards');
cardsEl.style.gridTemplateColumns='repeat(4, 1fr)';cardsEl.innerHTML=`<div class="card"><div class="card-label">純損益</div><div class="card-value ${totalCls}">${totalSign}${total.toLocaleString()}円</div><div class="card-sub">手数料控除後</div></div><div class="card"><div class="card-label">勝敗</div><div class="card-value">${wins}勝${losses}敗${evens>0?' '+evens+'分':''}</div></div><div class="card"><div class="card-label">勝率</div><div class="card-value">${wr}%</div></div><div class="card"><div class="card-label">総手数料</div><div class="card-value lose">-${DATA.fee_total.toLocaleString()}円</div><div class="card-sub">貸株料: 1030円/100株</div></div>`;
</script></body></html>
